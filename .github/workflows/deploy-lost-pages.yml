name: Deploy Lost Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: lost-pages-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build Lost Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Configure GitHub Pages build paths
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_LC="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "VITE_BASE_PATH=/$REPO_NAME/" >> "$GITHUB_ENV"
          echo "VITE_PUBLIC_ORIGIN=https://$OWNER_LC.github.io/$REPO_NAME" >> "$GITHUB_ENV"
      - name: Build site
        run: |
          set -euo pipefail
          npm install
          npm run build
          test -d dist
          touch dist/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
